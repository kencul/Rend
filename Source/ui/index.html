<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; 
               display: flex; justify-content: center; align-items: center; 
               height: 100vh; margin: 0; overflow: hidden; }
        .knob-container { text-align: center;}
        input { width: 250px; cursor: pointer;}
    </style>
</head>
<body>
    <div class="knob-container">
        <h3>Gain Control</h3>
        <input type="range" id="gainSlider" min="0" max="1" value="0.5" step="0.001">
    </div>

    <!-- No 'src' here. Use the block below to import and run your logic. -->
    <script type="module">
        // Use a relative path that matches the 'path' check in C++
        import * as Juce from "./juce/index.js";

        const slider = document.getElementById("gainSlider");
        const sliderState = Juce.getSliderState("gain");
        slider.oninput = function () {
            sliderState.setNormalisedValue(this.value);
        };

        slider.step = 1 / sliderState.properties.numSteps;

        sliderState.valueChangedEvent.addListener(() => {
            slider.value = sliderState.getNormalisedValue();
        });
    </script>
</body>
</html>
