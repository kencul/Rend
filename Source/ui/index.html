<!DOCTYPE html>
<html>
<head>
    <title>Distortion Curve Editor</title>
    <script type="module" src="main.js"></script>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .plugin-title {
            margin-bottom: 20px;
            font-size: 2em;
            color: #00FFFF; /* Bright cyan for the title */
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; 
        }
        .slider-group { /* New class to group label, slider, and value display */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px; /* Space between slider groups */
        }
        .slider-group label {
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .slider-value { /* Style for displaying slider value */
            font-size: 0.8em;
            color: #AAA;
            margin-top: 5px;
        }
        input[type="range"] { 
            width: 250px; 
            cursor: pointer;
        }
        canvas {
            background: #202020; 
            border: 1px solid #444; 
            border-radius: 5px; 
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); 
        }
        button {
            margin-top: 20px; /* Space above the button */
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1 class="plugin-title">Rend</h1>
    
    <div class="container">
        <!-- Canvas for the Curve Editor -->
        <canvas id="curveEditorCanvas" width="300" height="200"></canvas>

        <div class="knob-container">
            <!-- Gain Control Slider -->
            <div class="slider-group">
                <label for="gainSlider">Output Gain</label>
                <input type="range" id="gainSlider" min="0" max="1" value="0.5" step="0.01">
                <span id="gainLabel" class="slider-value">0.50</span>
            </div>

            <!-- Drive Control Slider -->
            <div class="slider-group">
                <label for="driveSlider">Drive</label>
                <input type="range" id="driveSlider" min="0" max="10" value="1" step="0.01">
                <span id="driveLabel" class="slider-value">1.00</span>
            </div>
            
            <button id="button">Send Debug Message</button>
        </div>

        <div class="preset-controls">
            <select id="presetSelect">
                <option value="" disabled selected>Select Preset...</option>
            </select>
            
            <button id="btnSave">Save</button>

            <button id="btnDelete">Delete</button>
        </div>
    </div>
</body>
</html>
